name: discount-bot

on:
  schedule:
    - cron: "*/15 * * * *"   # 폴링 모드 (즉시 실행 모드 활성화 후엔 삭제 가능)
  workflow_dispatch:          # 수동 실행
  repository_dispatch:        # 즉시 실행 모드: Cloudflare Worker가 트리거
    types: [telegram]

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_UPDATE_JSON: ${{ toJSON(github.event.client_payload.update) }}
        run: python main.py
