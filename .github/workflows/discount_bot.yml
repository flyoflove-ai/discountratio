name: discount-bot

on:
  schedule:
    - cron: "*/5 * * * *"   # 5분 주기 폴링 (GitHub 크론 특성상 실제 2~10분 지연 가능)
  workflow_dispatch:         # 수동 즉시 실행

concurrency:
  group: discount-bot        # 동시 실행 방지 (getUpdates 충돌 예방)
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
